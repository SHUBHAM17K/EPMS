<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Shubham Labs — Immersive 3D Experience</title>
    <meta name="description" content="Interactive 3D typography and WebGL experience showcasing dynamic spirals and soundscapes." />
  </head>
  <body>
    <!-- Preloader Overlay -->
    <div id="preloader" class="preloader">
      <div class="preloader-content">
        <div class="loader-circle-container">
          <svg class="loader-circle" viewBox="0 0 100 100">
            <circle class="loader-circle-bg" cx="50" cy="50" r="45"></circle>
            <circle class="loader-circle-progress" cx="50" cy="50" r="45" id="loader-progress-circle"></circle>
          </svg>
          <div class="loader-percentage" id="loader-percentage">0%</div>
        </div>
        <h1 class="loader-title">SHUBHAM <span class="accent">LABS</span></h1>
        <p class="loader-subtitle" id="loader-subtitle">Loading 3D space...</p>
        <button id="btn-enter" class="btn-enter hidden">ENTER EXPERIENCE</button>
      </div>
    </div>

    <!-- WebGL Canvas -->
    <canvas id="webgl-canvas"></canvas>

    <!-- Custom Cursor -->
    <div id="custom-cursor">
      <div class="cursor-dot"></div>
      <div class="cursor-ring">
        <span class="cursor-text" id="cursor-text">EXPLORE</span>
      </div>
    </div>

    <!-- Interface Overlays -->
    <header class="header">
      <div class="brand">
        <span class="brand-dot">⚡</span> SHUBHAM <span class="brand-sub">LABS</span>
      </div>
      <div class="menu-items">
        <span class="menu-link active">Spiral</span>
        <span class="menu-link" id="randomize-btn">Transform</span>
        <a href="http://localhost:3000" class="menu-link target-link">Task Manager</a>
      </div>
    </header>

    <div class="controls-overlay">
      <!-- Audio wave toggle -->
      <button class="control-btn" id="audio-toggle" title="Toggle Sound">
        <div class="sound-wave" id="sound-wave">
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
        </div>
        <span id="audio-status-text">SOUND OFF</span>
      </button>

      <!-- Drag indicator -->
      <div class="drag-indicator">
        <span class="indicator-icon">↔</span> DRAG TO SPIN | SCROLL TO FLY
      </div>
    </div>

    <footer class="footer">
      <div class="footer-left">EXPERIMENT 01 // HELIX TYPOGRAPHY</div>
      <div class="footer-right">© 2026 SHUBHAM. CREATIVE PORTFOLIO</div>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
